<div class="container mt-5">

  <!-- Titre -->
  <div class="text-center mb-5">
    <h1 class="fw-bold">Bank Account Management</h1>
    <h4 class="fw-bold">By CodeQueens👑</h4>
    <p class="text-muted">Smart • Secure • Efficient</p>
  </div>

  <!-- Cards statistiques -->
  <div class="row g-4 justify-content-center">

    <div class="col-md-4">
      <div class="card shadow-lg text-center border-0 stat-card">
        <div class="card-body">
          <i class="bi bi-people-fill display-4 text-primary"></i>
          <h5 class="mt-3">Total Customers</h5>
          <h2 class="fw-bold">{{ totalCustomers }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-lg text-center border-0 stat-card">
        <div class="card-body">
          <i class="bi bi-bank display-4 text-success"></i>
          <h5 class="mt-3">Accounts</h5>
          <h2 class="fw-bold">Active</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-lg text-center border-0 stat-card">
        <div class="card-body">
          <i class="bi bi-shield-lock-fill display-4 text-danger"></i>
          <h5 class="mt-3">Security</h5>
          <h2 class="fw-bold">Enabled</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- Actions -->
  <div class="text-center mt-5">
    <h4 class="mb-3">Quick Actions</h4>

    <a routerLink="/customers" class="btn btn-outline-primary btn-lg me-3">
      <i class="bi bi-list"></i> View Customers
    </a>

    <a routerLink="/new-customer" class="btn btn-primary btn-lg">
      <i class="bi bi-person-plus"></i> Add Customer
    </a>
  </div>

  <!-- Erreur -->
  <div *ngIf="errorMessage" class="alert alert-danger mt-4 text-center">
    {{ errorMessage }}
  </div>

</div>
