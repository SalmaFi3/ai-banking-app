<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow-lg p-4" style="width: 350px; border-radius: 15px;">
    <div class="text-center mb-4">
      <i class="bi bi-person-circle display-4 text-primary"></i>
      <h3 class="mt-2">Welcome Back!</h3>
      <p class="text-muted">Please login to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" formControlName="username" class="form-control" placeholder="Enter username" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" formControlName="password" class="form-control" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    
  </div>
</div>
